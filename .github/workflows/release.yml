# Fires on each `v*` tag push. Builds the extension, packages it as a
# .vsix, extracts the matching CHANGELOG entry as release notes, and
# creates a GitHub release with the vsix attached.
#
# Marketplace publishing (vsce publish) intentionally stays a manual
# step so that a human is the final gate before users see the new
# version.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required by softprops/action-gh-release

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies, compile and lint
        run: |
          npm ci
          npm run pretest

      - name: Run unit tests
        run: npm run test:unit

      - name: Package extension
        run: npx --yes @vscode/vsce package

      - name: Extract CHANGELOG section for ${{ github.ref_name }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Print lines between this version's header and the next one.
          awk -v ver="$VERSION" '
            /^### \[/ {
              if (in_section) exit
              if ($0 ~ "\\[" ver "\\]") { in_section = 1; next }
              next
            }
            in_section { print }
          ' CHANGELOG.md > release_notes.md
          echo "::group::Generated release notes ($(wc -l < release_notes.md) lines)"
          cat release_notes.md
          echo "::endgroup::"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          files: vscode-search-enhancement-*.vsix
          fail_on_unmatched_files: true
